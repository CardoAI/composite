name: Crowdstrike scan test
on:
  workflow_dispatch:
env:
  EU_AWS_ID: 861208160487
  EU_AWS_REGION: eu-central-1
jobs:
  build:
    name: Scan Image
    runs-on: ${{ vars.EU_GITHUB_RUNNER }}-amd64
    strategy:
      matrix:
        image:
          - name: 861208160487.dkr.ecr.eu-central-1.amazonaws.com/cardoai-eu-ar-ecr-repository-equalizer-core:backend-main-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: EU ECR login
        uses: CardoAI/composite/ecrlogin_with_role@main
        with:
          aws-region: ${{ env.EU_AWS_REGION }}
          aws-id: ${{ env.EU_AWS_ID }}

      - name: Docker Pull
        run: docker pull ${{ matrix.image.name }}

      - name: Docker Tag
        run: docker tag ${{ matrix.image.name }} backend-main-amd64

      - name: Scan Image
        uses: CardoAI/composite/scan_image_v5@main
        id: scan-image
        with:
          image: backend-main-amd64
          falcon-client-id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon-client-secret: ${{ secrets.FALCON_CLIENT_SECRET }}
