name: "Update production tag"
description: "Force-update the floating production tag to the current commit after a successful production deployment"
inputs:
  token:
    required: true
    description: "GitHub token with push permissions for force-pushing the tag"

runs:
  using: composite
  steps:
    - name: Update production tag
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        set -e
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f production "$COMMIT_SHA"
        git push "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" production --force
        echo "Updated production tag to $COMMIT_SHA"
