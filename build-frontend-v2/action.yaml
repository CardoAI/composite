name: "Build frontend v2"
description: "This action builds frontend with node_modules caching"

inputs:
  working-directory:
    description: Directory containing package.json and yarn.lock.
    default: "."

runs:
  using: composite
  steps:
    - name: Cache node_modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ inputs.working-directory }}/node_modules
        key: node-modules-${{ runner.os }}-${{ inputs.working-directory }}-${{ hashFiles(format('{0}/yarn.lock', inputs.working-directory)) }}
        restore-keys: |
          node-modules-${{ runner.os }}-${{ inputs.working-directory }}-

    - name: Build
      id: build-frontend
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: $GITHUB_ACTION_PATH/build.sh
